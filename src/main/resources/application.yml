spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

gemini:
  api-key: ${GEMINI_API_KEY}
  chat-model: gemini-2.5-pro
  rewrite-model: gemini-2.5-flash
  embedding-model: gemini-embedding-001
  embedding-dimensions: 1536
  max-tokens: 8192

search:
  top-k: 10

rag:
  max-context-tokens: 100000
  context-ratio: 0.8

collector:
  batch-size: 100
  embedding-batch-size: 90
  embedding-interval-ms: 3800

law-api:
  base-url: http://www.law.go.kr/DRF
  oc: ${LAW_API_OC:}
  request-delay-ms: 100
  max-display: 100
  max-retries: 3
  retry-delay-ms: 5000

logging:
  file:
    name: logs/oh-my-lawyer.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 1GB

server:
  port: 8080
